name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: ESLint
        run: yarn lint

      - name: TypeScript type check
        run: yarn tsc --noEmit

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run unit tests with coverage
        run: yarn test:coverage --ci --forceExit

      - name: Check coverage threshold
        run: |
          echo "Checking coverage thresholds..."
          COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
          echo "Total line coverage: $COVERAGE%"
          CORE_COVERAGE=$(cat coverage/coverage-summary.json | jq '."src/core".lines.pct // 0')
          STORE_COVERAGE=$(cat coverage/coverage-summary.json | jq '."src/features/*/store".lines.pct // 0' | jq -s 'add / length')
          echo "Core coverage: $CORE_COVERAGE%"
          echo "Store coverage: $STORE_COVERAGE%"
          if (( $(echo "$CORE_COVERAGE < 80" | bc -l) )); then
            echo "❌ Core coverage below 80%"
            exit 1
          fi
          if (( $(echo "$STORE_COVERAGE < 80" | bc -l) )); then
            echo "❌ Store coverage below 80%"
            exit 1
          fi
          echo "✅ Coverage thresholds met"
